{%- capture title -%}
  Hatuna Asset License (HAL) | {{ page.title }}
{%- endcapture -%}
{%- capture description -%}
  {%- if page.lang == 'ja' -%}
    {{ page.title }} | 日本語
  {%- elsif page.lang == 'en' -%}
    {{ page.title }} | English
  {%- endif -%}
{%- endcapture -%}
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="author" content="hatuna-827" />
<meta name="description" content="{{ description }}" />
<meta property="og:url" content="{{ '/' | relative_url }}" />
<meta property="og:type" content="website" />
<meta property="og:title" content="{{ title }}" />
<meta property="og:description" content="{{ description }}" />
<meta property="og:site_name" content="Hatuna Asset License (HAL)" />
<meta property="og:image" content="{{ '/assets/image/1024.png' | relative_url }}" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:domain" content="hatuna-827.github.io" />
<meta name="twitter:title" content="{{ title }}" />
<meta name="twitter:description" content="{{ description }}" />
<meta name="twitter:image" content="{{ '/assets/image/1024.png' | relative_url }}" />
<meta name="theme-color" content="#203363" />
<link rel="shortcut icon" type="image/x-icon" href="{{ '/assets/image/1024.png' | relative_url }}" />
<link rel="apple-touch-icon" href="{{ '/assets/image/1024.png' | relative_url }}" />
<link rel="stylesheet" href="{{ '/assets/css/default.css' | relative_url }}" />
<script src="{{ '/assets/js/default.js' | relative_url }}" type="module"></script>
<title>{{ title }}</title>
